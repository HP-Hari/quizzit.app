services:
  # Standalone Socket.IO backend
  - type: web
    name: quizzit-backend
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false # Set manually to MongoDB Atlas connection string
      - key: REDIS_URL
        fromService:
          type: redis
          name: quizzit-redis
          property: connectionString
      - key: SOCKET_PORT
        value: 10000 # Render routes traffic to port 10000 by default for web services
      - key: NEXTAUTH_URL
        value: https://quizzit.netlify.app # Update to your actual Netlify deployment URL

  # Managed Redis instance for syncing multi-instance rooms
  - type: redis
    name: quizzit-redis
    plan: free
    ipAllowList: []
