version: '3.8'

services:
  # MongoDB Replica Set (Required for Prisma transactions)
  mongodb:
    image: mongo:6.0
    container_name: quizzit-mongodb
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval \"try { rs.status().ok } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb:27017' }] }).ok }\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s

  # Redis for Socket.IO horizontal scaling adapter
  redis:
    image: redis:7-alpine
    container_name: quizzit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # Next.js Web Frontend & API server
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SOCKET_URL=/
    container_name: quizzit-app
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=mongodb://mongodb:27017/quizzit?replicaSet=rs0
      - NEXTAUTH_URL=http://localhost
      - NEXTAUTH_SECRET=4f98dfb01a64b2a8d3e91122a27ffb2a # Replace with a production-safe random secret
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

  # Socket.IO Real-time Gameplay server
  socket:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/server/index.js"]
    container_name: quizzit-socket
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=mongodb://mongodb:27017/quizzit?replicaSet=rs0
      - REDIS_URL=redis://redis:6379
      - SOCKET_PORT=3001
      - NEXTAUTH_URL=http://localhost
    restart: always

  # Nginx Gateway Routing Proxy
  nginx:
    image: nginx:alpine
    container_name: quizzit-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - socket
    restart: always

volumes:
  mongodb_data:
  redis_data:
